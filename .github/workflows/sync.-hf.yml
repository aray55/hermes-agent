name: Sync to Hugging Face Hub
on:
  push:
    branches: [main] # سيعمل الكود عند كل Push لفرع main
  workflow_dispatch: # يتيح لك تشغيل المزامنة يدوياً أيضاً

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        uses: huggingface/hub-sync@v1.0
        with:
          # اكتب هنا اسم مستودعك في GitHub (مثال: YourUsername/hermes-agent)
          github_repo_id: aray55/hermes-agent
          
          # اكتب هنا اسم حسابك واسم الـ Space في Hugging Face
          huggingface_repo_id: aray5/hermes-agent-space
          
          # هذا هو السر الذي أضفته في إعدادات GitHub
          hf_token: ${{ secrets.HF_TOKEN }}
